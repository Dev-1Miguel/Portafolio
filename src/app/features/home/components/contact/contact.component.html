<app-section-shell sectionId="contacto" extraClasses="scroll-mt-28 py-16 md:py-20 lg:py-24">
  <div class="relative mx-auto max-w-3xl">
    <div class="pointer-events-none absolute -left-10 top-10 h-24 w-24 rounded-full bg-orange-100/70 blur-3xl"></div>
    <div class="pointer-events-none absolute -right-8 bottom-10 h-28 w-28 rounded-full bg-sky-100/70 blur-3xl"></div>

    <div class="relative overflow-hidden rounded-[2rem] border border-white/80 bg-white/70 px-6 py-10 shadow-[0_24px_70px_rgba(15,23,42,0.10)] ring-1 ring-zinc-950/5 backdrop-blur-xl transition duration-300 md:px-8">
      <div class="mx-auto max-w-xl text-center">
        <span class="inline-flex rounded-full border border-white/80 bg-white/75 px-3.5 py-1.5 text-[10px] font-semibold uppercase tracking-[0.2em] text-zinc-500 shadow-sm backdrop-blur-sm transition duration-300">
          Contacto
        </span>

        <h2 class="mt-4 text-3xl font-black tracking-[-0.04em] text-zinc-950 md:text-4xl">
          &iquest;Tienes un proyecto o oportunidad? Hablemos.
        </h2>

        <p class="mt-3 text-sm leading-7 text-zinc-500 md:text-base">
          Estoy disponible para roles como desarrollador junior o colaboraciones freelance.
        </p>
      </div>

      <form class="mx-auto mt-7 max-w-xl" novalidate>
        <div class="grid gap-4">
          <div class="relative">
            <label for="contact-name" class="mb-1.5 block text-sm font-semibold text-zinc-700">
              Nombre
            </label>

            <span class="pointer-events-none absolute left-4 top-[2.9rem] text-zinc-400" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-[18px] w-[18px]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 19a4 4 0 0 0-8 0" />
                <circle cx="11" cy="7" r="3" />
              </svg>
            </span>

            <input
              id="contact-name"
              name="name"
              type="text"
              autocomplete="name"
              placeholder="Tu nombre"
              class="w-full rounded-2xl border border-white/80 bg-white/80 py-3 pl-11 pr-4 text-sm text-zinc-900 shadow-[inset_0_1px_0_rgba(255,255,255,0.75),0_10px_30px_rgba(15,23,42,0.04)] transition duration-300 placeholder:text-zinc-400 focus:border-sky-200 focus:bg-white focus:outline-none focus:ring-4 focus:ring-sky-100/80"
            />
          </div>

          <div class="relative">
            <label for="contact-email" class="mb-1.5 block text-sm font-semibold text-zinc-700">
              Email
            </label>

            <span class="pointer-events-none absolute left-4 top-[2.9rem] text-zinc-400" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-[18px] w-[18px]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21 5.5v9A2.5 2.5 0 0 1 18.5 17h-13A2.5 2.5 0 0 1 3 14.5v-9A2.5 2.5 0 0 1 5.5 3h13A2.5 2.5 0 0 1 21 5.5Z" />
                <path stroke-linecap="round" stroke-linejoin="round" d="m4 5 8 6 8-6" />
              </svg>
            </span>

            <input
              id="contact-email"
              name="email"
              type="email"
              autocomplete="email"
              placeholder="tuemail@ejemplo.com"
              class="w-full rounded-2xl border border-white/80 bg-white/80 py-3 pl-11 pr-4 text-sm text-zinc-900 shadow-[inset_0_1px_0_rgba(255,255,255,0.75),0_10px_30px_rgba(15,23,42,0.04)] transition duration-300 placeholder:text-zinc-400 focus:border-sky-200 focus:bg-white focus:outline-none focus:ring-4 focus:ring-sky-100/80"
            />
          </div>

          <div class="relative">
            <label for="contact-message" class="mb-1.5 block text-sm font-semibold text-zinc-700">
              Mensaje
            </label>

            <span class="pointer-events-none absolute left-4 top-[2.9rem] text-zinc-400" aria-hidden="true">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-[18px] w-[18px]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
                <path stroke-linecap="round" stroke-linejoin="round" d="M7.5 7.5h9m-9 4h6m-6 4h9M6 3.75h12A2.25 2.25 0 0 1 20.25 6v12A2.25 2.25 0 0 1 18 20.25H6A2.25 2.25 0 0 1 3.75 18V6A2.25 2.25 0 0 1 6 3.75Z" />
              </svg>
            </span>

            <textarea
              id="contact-message"
              name="message"
              rows="5"
              placeholder="Cu&eacute;ntame brevemente sobre tu proyecto, rol o idea."
              class="w-full resize-none rounded-2xl border border-white/80 bg-white/80 py-3 pl-11 pr-4 text-sm leading-6 text-zinc-900 shadow-[inset_0_1px_0_rgba(255,255,255,0.75),0_10px_30px_rgba(15,23,42,0.04)] transition duration-300 placeholder:text-zinc-400 focus:border-sky-200 focus:bg-white focus:outline-none focus:ring-4 focus:ring-sky-100/80"
            ></textarea>
          </div>
        </div>

        <div class="mt-5 flex justify-center">
          <button
            type="submit"
            class="inline-flex min-h-12 items-center justify-center gap-2 rounded-full bg-zinc-950 px-6 py-3 text-sm font-semibold text-white shadow-[0_14px_34px_rgba(15,23,42,0.16)] transition duration-300 hover:bg-zinc-800 hover:shadow-[0_18px_40px_rgba(15,23,42,0.18)] focus:outline-none focus:ring-4 focus:ring-zinc-900/10"
          >
            <span>Enviar mensaje</span>
            <svg xmlns="http://www.w3.org/2000/svg" class="h-[18px] w-[18px]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5 12h14" />
              <path stroke-linecap="round" stroke-linejoin="round" d="m13 5 7 7-7 7" />
            </svg>
          </button>
        </div>
      </form>
    </div>
  </div>
</app-section-shell>
