<app-section-shell sectionId="inicio" extraClasses="relative pt-32 pb-20 lg:pt-40 lg:pb-28">
  <div class="grid items-center gap-14 lg:grid-cols-[minmax(0,1.05fr)_minmax(320px,460px)] lg:gap-12">
    <div class="relative">
      <div class="pointer-events-none absolute -left-6 top-16 h-40 w-40 rounded-full bg-orange-100/70 blur-3xl"></div>

      <div class="relative max-w-2xl">
        <h1 class="max-w-xl text-5xl font-black leading-[0.98] tracking-[-0.05em] text-zinc-950 sm:text-6xl lg:text-[5.25rem]">
          Miguel Loor
        </h1>

        <div class="mt-6 inline-flex min-h-16 w-full max-w-xl items-center rounded-2xl border border-zinc-200/80 bg-white px-5 py-3 shadow-[0_18px_45px_rgba(15,23,42,0.08)] sm:px-6">
          <span class="font-mono text-xl font-bold tracking-[-0.03em] text-zinc-900 sm:text-3xl">
            <span class="typing-text">Ingeniero en Software</span>
          </span>
        </div>

        <p class="mt-8 max-w-xl text-lg leading-8 text-zinc-500">
          Soy estudiante de <span class="font-semibold text-zinc-900">Inteligencia Artificial</span> y desarrollador web.
          Me apasiona crear, aprender y llevar mis ideas a la realidad a traves de la programacion y creatividad.
        </p>
      </div>
    </div>

    <div class="relative mx-auto w-full max-w-sm sm:max-w-md lg:ml-auto lg:max-w-[23rem]">
      <div class="absolute inset-x-8 bottom-0 top-10 rounded-[2rem] bg-white/70 blur-3xl"></div>

      <div class="relative overflow-hidden rounded-[2rem] border border-white/70 bg-white/80 p-3 shadow-[0_30px_60px_rgba(15,23,42,0.16)] backdrop-blur-sm">
        <img
          [src]="heroImageUrl"
          [alt]="heroImageAlt"
          class="aspect-[4/4.95] w-full rounded-[1.6rem] object-cover object-center sm:aspect-[4/5.15] lg:aspect-[4/5.25]"
        />
      </div>
    </div>
  </div>
</app-section-shell>
