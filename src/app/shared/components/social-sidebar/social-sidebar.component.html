<aside class="fixed left-0 top-1/2 z-40 hidden -translate-y-1/2 md:flex">
  <div class="flex flex-col gap-3">
    @for (link of links; track trackByLabel($index, link)) {
      <a
        [href]="link.href"
        target="_blank"
        rel="noreferrer"
        [attr.aria-label]="link.label"
        [class]="'group flex h-14 w-14 items-center overflow-hidden rounded-r-2xl pr-5 shadow-[0_14px_34px_rgba(15,23,42,0.18)] transition-[width,background-color,transform,box-shadow] duration-300 ease-out hover:w-44 hover:-translate-y-0.5 focus:outline-none focus:ring-4 focus:ring-zinc-900/10 ' + toneClasses[link.icon]"
      >
        <span class="inline-flex h-14 w-14 shrink-0 items-center justify-center text-white">
          <i [class]="(iconClasses[link.icon] || 'pi pi-link') + ' text-2xl text-white'" aria-hidden="true"></i>
        </span>

        <span class="overflow-hidden whitespace-nowrap text-base font-semibold leading-none text-white opacity-0 transition-[max-width,opacity,transform,margin] duration-300 ease-out max-w-0 -translate-x-2 group-hover:ml-1 group-hover:max-w-[120px] group-hover:translate-x-0 group-hover:opacity-100">
          {{ link.label }}
        </span>
      </a>
    }
  </div>
</aside>
