<aside class="fixed left-0 top-1/2 z-40 hidden -translate-y-1/2 md:flex">
  <div class="flex flex-col gap-3">
    @for (link of links; track trackByLabel($index, link)) {
      <a
        [href]="link.href"
        target="_blank"
        rel="noreferrer"
        [attr.aria-label]="link.label"
        [class]="'group flex h-14 w-14 items-center overflow-hidden rounded-r-2xl pr-5 shadow-[0_14px_34px_rgba(15,23,42,0.18)] transition-all duration-500 ease-[cubic-bezier(0.22,1,0.36,1)] hover:w-44 hover:-translate-y-1 hover:shadow-[0_18px_40px_rgba(15,23,42,0.22)] focus:outline-none focus:ring-4 focus:ring-zinc-900/10 dark:shadow-[0_18px_38px_rgba(2,6,23,0.34)] dark:focus:ring-white/10 ' + toneClasses[link.icon]"
      >
        <span class="inline-flex h-14 w-14 shrink-0 items-center justify-center text-white transition-transform duration-500 ease-[cubic-bezier(0.22,1,0.36,1)] group-hover:scale-110">
          <i
            [class]="(iconClasses[link.icon] || 'pi pi-link') + ' text-2xl text-white transition-transform duration-500 group-hover:scale-110'"
            aria-hidden="true"
          ></i>
        </span>

        <span class="ml-0 overflow-hidden whitespace-nowrap text-base font-semibold leading-none text-white opacity-0 max-w-0 -translate-x-3 transition-all duration-500 ease-[cubic-bezier(0.22,1,0.36,1)] group-hover:ml-1 group-hover:max-w-[140px] group-hover:translate-x-0 group-hover:opacity-100">
          {{ link.label }}
        </span>
      </a>
    }
  </div>
</aside>
