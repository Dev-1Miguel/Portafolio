<aside class="fixed left-0 top-1/2 z-40 hidden -translate-y-1/2 md:flex">
  <div class="flex flex-col gap-3">
    @for (link of links; track trackByLabel($index, link)) {
      <a
        [href]="link.href"
        target="_blank"
        rel="noreferrer"
        [attr.aria-label]="link.label"
        [class]="'group flex h-14 w-14 items-center overflow-hidden rounded-r-2xl pr-5 shadow-[0_14px_34px_rgba(15,23,42,0.18)] transition-[width,background-color,transform,box-shadow] duration-300 ease-out hover:w-44 hover:-translate-y-0.5 focus:outline-none focus:ring-4 focus:ring-zinc-900/10 ' + toneClasses[link.icon]"
      >
        <span class="inline-flex h-14 w-14 shrink-0 items-center justify-center text-white">
          @if (link.icon === 'linkedin') {
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M6.94 8.5H3.56V19.5h3.38zm.22-3.4a1.94 1.94 0 1 0-3.88 0 1.94 1.94 0 0 0 3.88 0M20.44 12.77c0-3.32-1.77-4.86-4.13-4.86-1.9 0-2.75 1.04-3.22 1.78V8.5H9.72c.04.79 0 11 0 11h3.37v-6.14c0-.33.03-.65.12-.88.26-.65.84-1.32 1.81-1.32 1.28 0 1.8.98 1.8 2.42v5.92h3.38z" />
            </svg>
          } @else {
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 .5a12 12 0 0 0-3.79 23.39c.6.11.82-.26.82-.58v-2.03c-3.34.73-4.04-1.42-4.04-1.42-.55-1.38-1.33-1.75-1.33-1.75-1.09-.74.08-.73.08-.73 1.2.09 1.84 1.24 1.84 1.24 1.08 1.84 2.82 1.31 3.51 1 .11-.79.42-1.31.76-1.61-2.67-.31-5.48-1.35-5.48-5.97 0-1.32.47-2.39 1.24-3.24-.13-.31-.54-1.58.12-3.28 0 0 1.01-.33 3.3 1.24a11.4 11.4 0 0 1 6 0c2.28-1.57 3.29-1.24 3.29-1.24.66 1.7.25 2.97.12 3.28.77.85 1.24 1.92 1.24 3.24 0 4.64-2.82 5.65-5.5 5.96.43.38.82 1.1.82 2.23v3.31c0 .32.22.7.83.58A12 12 0 0 0 12 .5" />
            </svg>
          }
        </span>

        <span class="overflow-hidden whitespace-nowrap text-base font-semibold leading-none text-white opacity-0 transition-[max-width,opacity,transform,margin] duration-300 ease-out max-w-0 -translate-x-2 group-hover:ml-1 group-hover:max-w-[120px] group-hover:translate-x-0 group-hover:opacity-100">
          {{ link.label }}
        </span>
      </a>
    }
  </div>
</aside>
