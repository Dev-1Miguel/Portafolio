<nav class="fixed inset-x-0 top-0 z-50 flex justify-center px-2 pt-3 sm:px-4 sm:pt-5 lg:pt-6">
  <div class="navbar-shell relative flex w-full max-w-full items-center gap-1 overflow-x-auto rounded-[1.35rem] border border-white/70 bg-white/88 px-1.5 py-1.5 shadow-[0_18px_50px_rgba(15,23,42,0.12)] backdrop-blur-xl dark:border-white/10 dark:bg-zinc-950/80 dark:shadow-[0_18px_50px_rgba(2,6,23,0.42)] sm:max-w-max sm:rounded-[1.75rem] sm:px-3 sm:py-3">
    <span
      class="nav-indicator pointer-events-none absolute bottom-1.5 left-0 top-1.5 rounded-full sm:bottom-3 sm:top-3"
      [style.width]="activeIndicator().width"
      [style.transform]="'translateX(' + activeIndicator().left + ')'"
    ></span>

    @for (item of items; track trackByHref($index, item)) {
      <button
        #navButton
        type="button"
        class="nav-link relative z-10 inline-flex min-h-[44px] min-w-fit shrink-0 items-center justify-center gap-1.5 rounded-full px-3 py-2 text-[11px] font-medium transition-colors duration-200 ease-out sm:min-h-[44px] sm:min-w-[120px] sm:gap-2 sm:px-4 sm:py-2.5 sm:text-sm"
        [class.is-active]="isActive(item.href)"
        (click)="selectItem(item)"
      >
        <i
          [class]="(iconClasses[item.icon] || 'pi pi-arrow-up-right') + ' text-[13px] shrink-0 sm:text-sm'"
          aria-hidden="true"
        ></i>

        <span class="whitespace-nowrap">{{ item.label }}</span>
      </button>
    }

    <div class="nav-theme-slot relative z-10 ml-1 flex shrink-0 items-center pl-2 sm:ml-2 sm:pl-3">
      <span class="nav-theme-divider" aria-hidden="true"></span>

      <button
        type="button"
        class="inline-flex h-11 w-11 shrink-0 items-center justify-center rounded-full border border-zinc-200/80 bg-white/90 text-zinc-700 shadow-[0_8px_22px_rgba(15,23,42,0.08)] transition duration-200 ease-out hover:-translate-y-0.5 hover:bg-zinc-50 hover:text-zinc-950 focus:outline-none focus:ring-4 focus:ring-zinc-900/10 dark:border-white/10 dark:bg-white/5 dark:text-zinc-200 dark:hover:bg-white/10 dark:hover:text-white dark:focus:ring-white/10"
        [attr.aria-label]="themeToggleLabel()"
        [attr.aria-pressed]="theme.currentTheme() === 'dark'"
        [attr.title]="themeToggleLabel()"
        (click)="toggleTheme()"
      >
        <i
          [class]="theme.currentTheme() === 'dark' ? 'pi pi-sun text-sm' : 'pi pi-moon text-sm'"
          aria-hidden="true"
        ></i>

        <span class="sr-only">{{ themeToggleLabel() }}</span>
      </button>
    </div>
  </div>
</nav>
