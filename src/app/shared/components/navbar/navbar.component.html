<nav class="fixed inset-x-0 top-0 z-50 flex justify-center px-3 pt-4 sm:px-4 sm:pt-6">
  <div class="navbar-shell relative flex w-full max-w-max items-center gap-1 overflow-x-auto rounded-[1.5rem] border border-white/70 bg-white/88 px-2 py-2 shadow-[0_18px_50px_rgba(15,23,42,0.12)] backdrop-blur-xl sm:rounded-[1.75rem] sm:px-3 sm:py-3">
    <span
      class="nav-indicator pointer-events-none absolute bottom-2 left-0 top-2 rounded-full bg-zinc-950 shadow-[0_10px_25px_rgba(15,23,42,0.22)] sm:bottom-3 sm:top-3"
      [style.width]="activeIndicator().width"
      [style.transform]="'translateX(' + activeIndicator().left + ')'"
    ></span>

    @for (item of items; track trackByHref($index, item)) {
      <button
        #navButton
        type="button"
        class="relative z-10 inline-flex min-h-[40px] min-w-[96px] items-center justify-center gap-2 rounded-full px-3 py-2 text-xs font-medium transition-colors duration-200 ease-out sm:min-h-[44px] sm:min-w-[120px] sm:px-4 sm:py-2.5 sm:text-sm"
        [class.text-white]="isActive(item.href)"
        [class.text-zinc-700]="!isActive(item.href)"
        [class.hover:bg-zinc-900/5]="!isActive(item.href)"
        (click)="selectItem(item)"
      >
        <i
          [class]="(iconClasses[item.icon] || 'pi pi-arrow-up-right') + ' text-sm shrink-0'"
          aria-hidden="true"
        ></i>

        <span class="whitespace-nowrap">{{ item.label }}</span>
      </button>
    }
  </div>
</nav>
