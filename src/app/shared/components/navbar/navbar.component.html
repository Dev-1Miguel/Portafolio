<nav class="fixed inset-x-0 top-0 z-50 flex justify-center px-4 pt-6">
  <div class="relative flex items-center gap-1 rounded-[1.75rem] border border-white/70 bg-white/88 px-3 py-3 shadow-[0_18px_50px_rgba(15,23,42,0.12)] backdrop-blur-xl">
    <span
      class="pointer-events-none absolute bottom-3 left-0 top-3 rounded-full bg-zinc-950 shadow-[0_10px_25px_rgba(15,23,42,0.28)] transition-[transform,width] duration-300 ease-out"
      [style.width]="indicatorWidth()"
      [style.transform]="'translateX(' + indicatorLeft() + ')'"
    ></span>

    @for (item of items; track trackByHref($index, item)) {
      <button
        #navButton
        type="button"
        class="relative z-10 flex cursor-pointer items-center gap-2 rounded-full px-4 py-2.5 text-sm font-medium transition-colors duration-300"
        [class.text-white]="isActive(item.href)"
        [class.text-zinc-700]="!isActive(item.href)"
        [class.hover:bg-zinc-100]="!isActive(item.href)"
        [class.hover:text-zinc-900]="!isActive(item.href)"
        (click)="selectItem(item, $index)"
      >
        @switch (item.icon) {
          @case ('home') {
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 10.5 12 3l9 7.5" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M5.25 9.75V21h13.5V9.75" />
            </svg>
          }
          @case ('user') {
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15 19a4 4 0 0 0-8 0" />
              <circle cx="11" cy="7" r="3" />
            </svg>
          }
          @case ('folder') {
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3.75 7.5A2.25 2.25 0 0 1 6 5.25h3l1.5 1.5H18A2.25 2.25 0 0 1 20.25 9v8.25A2.25 2.25 0 0 1 18 19.5H6A2.25 2.25 0 0 1 3.75 17.25V7.5Z" />
            </svg>
          }
          @default {
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="m8 16 8-8" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M9.5 6.5h8v8" />
              <path stroke-linecap="round" stroke-linejoin="round" d="M6 17.5h.01" />
            </svg>
          }
        }

        <span>{{ item.label }}</span>
      </button>
    }
  </div>
</nav>
