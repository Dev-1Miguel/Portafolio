<footer class="zinc-200/70">
  <div class="mx-auto w-full max-w-7xl px-6 py-4 lg:px-10">
    <div class="flex w-full flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
      <p class="text-sm font-semibold tracking-[-0.02em] text-zinc-800">
        Miguel Dar&iacute;o Loor Vera
      </p>

      <div class="flex items-center gap-3">
        @for (link of links; track trackByLabel($index, link)) {
          <a
            [href]="link.href"
            target="_blank"
            rel="noreferrer"
            [attr.aria-label]="link.label"
            class="inline-flex h-10 w-10 items-center justify-center rounded-full border border-zinc-200 bg-white text-zinc-700 shadow-[0_10px_24px_rgba(15,23,42,0.08)] transition duration-300 hover:-translate-y-0.5 hover:bg-white hover:text-zinc-950 focus:outline-none focus:ring-4 focus:ring-zinc-900/10"
          >
            <i [class]="(iconClasses[link.icon] || 'pi pi-link') + ' text-[18px]'" aria-hidden="true"></i>
          </a>
        }
      </div>
    </div>
  </div>
</footer>
